version: 0.2

env:
  variables:
    EKS_CLUSTER_NAME: "brain-cluster"
    AWS_REGION: "ap-south-1"

phases:
  install:
    commands:
      - echo "Installing kubectl"
      - curl -sLO "https://s3.us-west-2.amazonaws.com/amazon-eks/1.29.0/2024-01-04/bin/linux/amd64/kubectl"
      - chmod +x ./kubectl
      - mv ./kubectl /usr/local/bin/kubectl

  pre_build:
    commands:
      - echo "Connecting to EKS cluster"
      - aws eks update-kubeconfig --name $EKS_CLUSTER_NAME --region $AWS_REGION

  build:
    commands:
      - echo "Deploying to EKS"
      - kubectl apply -f deployment.yaml
      - kubectl apply -f service.yaml
      - kubectl rollout status deployment/brain-task-deployment --timeout=180s

  post_build:
    commands:
      - echo "Deployment complete"
      - kubectl get pods
      - kubectl get svc
